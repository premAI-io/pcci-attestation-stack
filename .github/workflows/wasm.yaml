on: ["push"]

jobs:
    clippy:
        strategy:
            matrix:
                include:
                    - target: wasm32-unknown-unknown
                      features: snp-attest/kds_async
                    - target: x86_64-unknown-linux-gnu
                      features: snp-attest/kds_sync
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  target: ${{ matrix.target }}
            - name: Run Clippy
              run: cargo clippy --target=${{ matrix.target }} --features=${{ matrix.features }}
